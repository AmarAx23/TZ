<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Click → Gacha Love 💗🎰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Mali:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #1d5d99;
    --bg-2: #3f8cc9;
    --bg-3: #6bb6e8;
    --bg-4: #a8defc;
    --neon-pink: #ff8fc4;
    --neon-violet: #a78bfa;
    --neon-cyan: #5fd8e8;
    --neon-amber: #ffd479;
    --glass-border: rgba(255,255,255,0.28);
    --text: #ffffff;
    --text-dim: #e4f3ff;
    --card: #14507f;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(circle at 50% 0%, var(--bg-4) 0%, var(--bg-3) 35%, var(--bg-2) 70%, var(--bg-1) 100%);
    font-family: 'Mali', 'Noto Sans Thai', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  h1, h2, .heading, .eyebrow, .reveal-tag, .machine-top-bar span, .pull-label, .btn, .tap-hint, .counter {
    font-family: 'Kanit', 'Noto Sans Thai', sans-serif;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 620px;
    overflow: hidden;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: radial-gradient(circle at 50% 35%, black 0%, transparent 70%);
    pointer-events: none;
  }

  .ambient-glow {
    position: absolute;
    top: -8%;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,212,121,0.18) 0%, rgba(255,143,196,0.10) 45%, transparent 75%);
    pointer-events: none;
    filter: blur(2px);
    left: 50%;
    transform: translateX(-50%);
  }

  /* Scenes */
  .scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 1;
    transform: scale(1) translateY(0);
    transition: opacity 0.55s ease, transform 0.55s ease;
    z-index: 2;
  }
  .scene.scale125 > .scale-wrap { transform: scale(1.25); }

  .scale-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .scene.exit-left {
    opacity: 0;
    transform: scale(0.92) translateY(-16px);
    pointer-events: none;
  }
  .scene.enter-wait {
    opacity: 0;
    pointer-events: none;
  }
  .scene.enter-active {
    opacity: 1;
  }

  .eyebrow {
    color: var(--neon-amber);
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    opacity: 0.95;
    margin-bottom: 10px;
    font-weight: 600;
    text-align: center;
    transition: opacity 0.4s ease;
  }

  .heading {
    color: var(--text);
    font-size: 1.2rem;
    margin: 0 0 16px;
    text-align: center;
    font-weight: 600;
    min-height: 1.5em;
    letter-spacing: 0.01em;
    text-shadow: 0 2px 12px rgba(10,37,64,0.4);
  }

  /* ===== Heart Click scene ===== */
  .heart-zone {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: visible;
  }

  .ring { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .ring svg { transform: rotate(-90deg); }
  .ring circle.track { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 4; }
  .ring circle.fill {
    fill: none; stroke: var(--neon-pink); stroke-width: 4; stroke-linecap: round;
    stroke-dasharray: 614; stroke-dashoffset: 614;
    transition: stroke-dashoffset 0.4s ease;
  }

  .heart-svg {
    position: relative;
    width: 179px; height: 179px;
    transition: transform 0.12s ease;
    filter: drop-shadow(0 10px 18px rgba(20,80,127,0.35));
    z-index: 2;
  }
  .cat-photo-dim {
    filter: grayscale(0.85) brightness(0.55) saturate(0.6);
  }
  .heart-zone.tapped .heart-svg { transform: scale(0.86); }
  .heart-zone.wobble .heart-svg { animation: wobbleShake 0.4s ease; }
  @keyframes wobbleShake {
    0% { transform: rotate(0deg) scale(0.86); }
    20% { transform: rotate(-12deg) scale(0.9); }
    45% { transform: rotate(10deg) scale(0.95); }
    70% { transform: rotate(-6deg) scale(1); }
    100% { transform: rotate(0deg) scale(1); }
  }

  .paw-swipe {
    position: absolute;
    font-size: 30px;
    top: 38%;
    left: -10%;
    opacity: 0;
    z-index: 7;
    animation: pawAcross 0.7s ease-in-out forwards;
  }
  @keyframes pawAcross {
    0% { opacity: 0; left: -10%; transform: rotate(-25deg) scale(0.7); }
    15% { opacity: 1; }
    50% { opacity: 1; left: 48%; transform: rotate(8deg) scale(1.05); }
    85% { opacity: 1; }
    100% { opacity: 0; left: 105%; transform: rotate(20deg) scale(0.8); }
  }

  .quip-pop {
    position: absolute;
    color: #fff;
    font-weight: 700;
    font-size: 1.05rem;
    white-space: nowrap;
    opacity: 0;
    z-index: 8;
    text-shadow: 0 2px 8px rgba(20,80,127,0.5);
    animation: quipPop 0.85s cubic-bezier(0.34,1.56,0.64,1) forwards;
    font-family: 'Kanit', sans-serif;
  }
  @keyframes quipPop {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.4) rotate(-8deg); }
    25% { opacity: 1; transform: translate(-50%, -16px) scale(1.15) rotate(4deg); }
    60% { opacity: 1; transform: translate(-50%, -22px) scale(1) rotate(-2deg); }
    100% { opacity: 0; transform: translate(-50%, -46px) scale(0.95) rotate(0deg); }
  }

  .tap-hint { margin-top: 22px; color: var(--text-dim); font-size: 0.85rem; opacity: 0.85; }

  .floaters { position: absolute; inset: 0; pointer-events: none; overflow: visible; z-index: 5; }
  .floater {
    position: absolute; font-size: 20px; opacity: 0;
    animation: floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    15% { opacity: 1; transform: translate(-50%, -120%) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, -260%) scale(0.9); }
  }
  .word-pop {
    position: absolute; color: #fff; font-style: italic; font-size: 0.95rem; white-space: nowrap;
    opacity: 0; animation: wordPop 1.6s ease-out forwards; z-index: 6;
    font-family: 'Mali', sans-serif;
  }
  @keyframes wordPop {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -40px) scale(1); }
  }

  .continue-btn {
    margin-top: 26px;
    border: none;
    border-radius: 24px;
    padding: 12px 22px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-violet));
    color: #fff;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }
  .continue-btn.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

  /* ===== Gacha scene (reused) ===== */
  .counter { color: var(--text-dim); font-size: 0.78rem; margin-bottom: 18px; letter-spacing: 0.05em; }

  .gacha-title {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    color: #16324a;
    margin: 0 0 26px;
    text-align: center;
    text-shadow: 0 2px 0 rgba(255,255,255,0.4);
  }

  .machine { position: relative; width: 200px; height: 290px; margin-top: 10px; }

  .dome-housing {
    position: relative;
    width: 168px; height: 168px;
    margin: 0 auto -34px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 26%, rgba(255,255,255,0.95), rgba(255,255,255,0.35) 55%, rgba(255,255,255,0.18) 100%);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 14px 30px rgba(10,40,70,0.25), 0 0 0 6px rgba(255,255,255,0.25);
    overflow: hidden;
    z-index: 2;
  }
  .dome-shine {
    position: absolute; top: 8%; left: 14%; width: 38%; height: 24%;
    background: rgba(255,255,255,0.6); border-radius: 50%; transform: rotate(-18deg); filter: blur(2px);
  }
  .capsule-pile { position: absolute; inset: 0; }
  .capsule-pile.shaking { animation: pileShake 0.65s ease-in-out; }
  @keyframes pileShake {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    8%  { transform: translate(-9px, 5px) rotate(-7deg); }
    16% { transform: translate(10px, -6px) rotate(8deg); }
    24% { transform: translate(-11px, 7px) rotate(-9deg); }
    32% { transform: translate(11px, -5px) rotate(9deg); }
    40% { transform: translate(-9px, 6px) rotate(-7deg); }
    48% { transform: translate(10px, -7px) rotate(8deg); }
    56% { transform: translate(-8px, 5px) rotate(-6deg); }
    64% { transform: translate(7px, -4px) rotate(5deg); }
    72% { transform: translate(-5px, 3px) rotate(-4deg); }
    80% { transform: translate(4px, -2px) rotate(3deg); }
    88% { transform: translate(-2px, 1px) rotate(-1deg); }
  }
  .capsule-scatter {
    position: absolute;
    --sx: 0px; --sy: 0px;
  }
  .capsule-scatter.scattering { animation: capsuleScatter 0.65s ease-out; }
  @keyframes capsuleScatter {
    0%   { transform: translate(0,0) scale(1); }
    28%  { transform: translate(var(--sx), var(--sy)) scale(1.1); }
    58%  { transform: translate(calc(var(--sx) * -0.55), calc(var(--sy) * -0.55)) scale(0.95); }
    80%  { transform: translate(calc(var(--sx) * 0.2), calc(var(--sy) * 0.2)) scale(1.03); }
    100% { transform: translate(0,0) scale(1); }
  }
  .pile-capsule { position: relative; width: 26px; height: 26px; border-radius: 50%; overflow: hidden; box-shadow: 0 2px 5px rgba(10,40,70,0.18); }
  @keyframes capsuleFloatA {
    0%   { transform: translate(0px, 0px); }
    25%  { transform: translate(5px, -7px); }
    50%  { transform: translate(-3px, -11px); }
    75%  { transform: translate(-6px, -4px); }
    100% { transform: translate(0px, 0px); }
  }
  @keyframes capsuleFloatB {
    0%   { transform: translate(0px, 0px); }
    25%  { transform: translate(-6px, -5px); }
    50%  { transform: translate(3px, -10px); }
    75%  { transform: translate(6px, -3px); }
    100% { transform: translate(0px, 0px); }
  }
  @keyframes capsuleFloatC {
    0%   { transform: translate(0px, 0px); }
    33%  { transform: translate(5px, 5px); }
    66%  { transform: translate(-5px, -6px); }
    100% { transform: translate(0px, 0px); }
  }
  .pile-capsule .top, .pile-capsule .bottom { position: absolute; width: 100%; height: 50%; }
  .pile-capsule .top { top: 0; border-radius: 26px 26px 0 0; }
  .pile-capsule .bottom { bottom: 0; border-radius: 0 0 26px 26px; }

  .machine-body {
    position: relative; width: 100%; height: 226px;
    background: linear-gradient(165deg, #ff7a8a 0%, #ef5068 55%, #d63a52 100%);
    border-radius: 30px;
    box-shadow: 0 24px 46px rgba(180,40,60,0.35), inset 0 2px 0 rgba(255,255,255,0.35);
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 40px;
    z-index: 1;
  }
  .machine-body::before {
    content: '';
    position: absolute;
    top: 56px; left: 0; width: 100%; height: 8px;
    background: rgba(0,0,0,0.12);
  }
  .machine-body::after {
    content: '';
    position: absolute;
    top: -10%; left: -20%; width: 70%; height: 50%;
    background: rgba(255,255,255,0.14);
    border-radius: 50%;
    transform: rotate(-20deg);
    pointer-events: none;
  }

  .slot-strip {
    width: 76%; height: 26px; margin-top: 18px; margin-bottom: 0; border-radius: 10px;
    background: rgba(15,10,20,0.55);
    box-shadow: 0 0 14px rgba(0,0,0,0.25) inset;
    position: relative; z-index: 2;
  }
  .knob-row { display: flex; align-items: center; justify-content: center; margin-top: 26px; position: relative; z-index: 2; }
  .machine-knob {
    position: relative; width: 72px; height: 72px; border-radius: 50%;
    background: radial-gradient(circle at 35% 28%, #ffffff, #fdeef0 60%);
    box-shadow: 0 0 0 5px rgba(255,255,255,0.25), 0 8px 16px rgba(120,15,35,0.35);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, box-shadow 0.3s ease;
    animation: knobBreathe 1.8s ease-in-out infinite;
  }
  .machine-knob:active { transform: scale(0.9); }
  .machine-knob.spin { animation: knobSpin 0.6s ease; }
  @keyframes knobSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes knobBreathe {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 5px rgba(255,255,255,0.25), 0 8px 16px rgba(120,15,35,0.35); }
    50% { transform: scale(1.05); box-shadow: 0 0 0 9px rgba(255,255,255,0.35), 0 10px 20px rgba(120,15,35,0.4); }
  }
  .knob-icon { display: block; }
  .pull-label {
    color: rgba(255,255,255,0.85); font-size: 0.74rem; letter-spacing: 0.1em;
    margin-top: 12px; position: relative; z-index: 2; font-weight: 600;
  }

  .drop-zone { display: none; }
  .falling-capsule {
    position: fixed; left: 0; top: 0; width: 30px; height: 30px; border-radius: 50%;
    opacity: 0; transform: translate(-50%, -50%) scale(0.6); pointer-events: none; overflow: hidden;
    box-shadow: 0 0 10px rgba(255,255,255,0.25);
    z-index: 50;
    transition: top 0.5s cubic-bezier(0.5,0,0.85,0.4), left 0.5s cubic-bezier(0.5,0,0.85,0.4), transform 0.5s cubic-bezier(0.5,0,0.85,0.4), opacity 0.15s ease;
  }
  .falling-capsule .top, .falling-capsule .bottom { position: absolute; width: 100%; height: 50%; }
  .falling-capsule .top { top: 0; border-radius: 30px 30px 0 0; }
  .falling-capsule .bottom { bottom: 0; border-radius: 0 0 30px 30px; }

  .tray { position: relative; margin-top: 4px; min-height: 78px; display: flex; align-items: center; justify-content: center; z-index: 3; }
  .capsule {
    position: relative; width: 66px; height: 66px; border-radius: 50%; cursor: pointer;
    opacity: 0; transform: scale(0.3);
    transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 18px rgba(255,255,255,0.2), 0 8px 16px rgba(10,40,70,0.3);
  }
  .capsule.show { opacity: 1; transform: scale(1); }
  .capsule.show.idle-pulse { animation: capsuleInvite 1.4s ease-in-out infinite; }
  @keyframes capsuleInvite {
    0%, 100% { box-shadow: 0 0 18px rgba(255,255,255,0.2), 0 8px 16px rgba(10,40,70,0.3); }
    50% { box-shadow: 0 0 30px rgba(255,200,90,0.55), 0 8px 16px rgba(10,40,70,0.3); }
  }
  .capsule.bounce { animation: capsuleBounce 0.5s ease; }
  @keyframes capsuleBounce {
    0% { transform: scale(1); } 35% { transform: scale(1.15) rotate(-4deg); }
    65% { transform: scale(0.95) rotate(3deg); } 100% { transform: scale(1); }
  }
  .capsule .top, .capsule .bottom { position: absolute; width: 100%; height: 50%; }
  .capsule .top { top: 0; border-radius: 66px 66px 0 0; }
  .capsule .bottom { bottom: 0; border-radius: 0 0 66px 66px; }
  .capsule .shine { position: absolute; top: 8px; left: 12px; width: 18px; height: 11px; background: rgba(255,255,255,0.7); border-radius: 50%; transform: rotate(-20deg); }
  .capsule .seam { position: absolute; top: 50%; left: 0; width: 100%; height: 3px; background: rgba(10,40,70,0.2); transform: translateY(-50%); }

  .sparkle-burst { position: absolute; inset: 0; pointer-events: none; overflow: visible; }
  .spark { position: absolute; font-size: 13px; opacity: 0; animation: sparkOut 0.7s ease-out forwards; }
  @keyframes sparkOut {
    0% { opacity: 0; transform: translate(-50%,-50%) translate(0,0) scale(0.4); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) translate(var(--sx), var(--sy)) scale(1); }
  }

  /* Reveal modal (shared) */
  .reveal {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    background: rgba(10,40,70,0);
    transition: opacity 0.5s ease, background 0.5s ease;
    padding: 24px;
  }
  .reveal.show { opacity: 1; pointer-events: auto; background: rgba(10,40,70,0.55); }

  .reveal-card {
    position: relative;
    width: min(86vw, 360px);
    max-height: 80vh;
    overflow-y: auto;
    background: linear-gradient(165deg, var(--card), #0c3a5c);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    padding: 34px 26px 26px;
    text-align: center;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5), 0 0 40px rgba(139,107,242,0.2);
    transform: translateY(26px) scale(1.175);
    transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }
  .reveal.show .reveal-card { transform: translateY(0) scale(1.25); }

  .reveal-tag {
    display: inline-block; font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: #0a2540; background: linear-gradient(90deg, var(--neon-pink), var(--neon-amber));
    padding: 5px 14px; border-radius: 20px; margin-bottom: 16px; font-weight: 700;
  }
  .reveal-msg { font-size: 1.05rem; color: var(--text); line-height: 1.85; white-space: pre-line; margin: 0 0 22px; }
  .reveal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn { border: none; border-radius: 24px; padding: 11px 18px; font-size: 0.85rem; cursor: pointer; font-weight: 600; }
  .btn-again { background: linear-gradient(90deg, var(--neon-pink), var(--neon-violet)); color: #fff; }
  .btn-close { background: rgba(255,255,255,0.15); color: var(--text); }

  .confetti-burst { position: fixed; inset: 0; pointer-events: none; z-index: 25; overflow: hidden; }
  .confetti {
    position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border-radius: 2px;
    opacity: 0; animation: burst 1.5s ease-out forwards;
  }
  @keyframes burst {
    0% { opacity: 1; transform: translate(-50%, -50%) translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) translate(var(--bx), var(--by)) rotate(var(--br)) scale(0.6); }
  }

  @media (prefers-reduced-motion: reduce) {
    .floater, .word-pop, .spark, .confetti, .capsule.bounce, .machine-knob.spin, .knob-ring,
    .machine-knob, .pile-capsule, .capsule-pile.shaking, .capsule.show.idle-pulse, .capsule-scatter.scattering { animation: none !important; }
    .falling-capsule { transition: opacity 0.15s ease !important; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="grid-bg"></div>
  <div class="ambient-glow"></div>
  <div class="falling-capsule" id="fallingCapsule">
    <div class="top"></div><div class="bottom"></div>
  </div>

  <!-- Scene 1: Heart Click -->
  <div class="scene" id="sceneHeart">
    <div class="scale-wrap">
      <div class="eyebrow" id="eyebrowHeart">แตะพี่ฟิวส์เบาๆ</div>
      <h1 class="heading" id="headingHeart">แม่ตุ่นค้าบบ จิ้มๆ ผมหน่อยค้าบบ 💕</h1>

      <div class="heart-zone" id="heartZone">
        <div class="ring">
          <svg viewBox="0 0 210 210" width="220" height="220">
            <circle class="track" cx="105" cy="105" r="98"></circle>
            <circle class="fill" id="ringFill" cx="105" cy="105" r="98"></circle>
          </svg>
        </div>
        <svg class="heart-svg" id="heartSvg" viewBox="0 0 100 100">
          <defs>
            <clipPath id="circleClip">
              <circle cx="50" cy="50" r="50"></circle>
            </clipPath>
            <clipPath id="fillClip">
              <rect class="fill-clip" id="fillClipRect" x="0" y="100" width="100" height="0"></rect>
            </clipPath>
          </defs>

      <h2 class="gacha-title">มีคนดื้อป่วย</h2>
      <h1 class="heading" id="headingGacha">กดปุ่ม เพื่อดูว่า จะได้กินอะไร วันอาทิตย์</h1>
      <div class="counter" id="counter">หมุนแล้ว 0 ครั้ง</div>

      <div class="machine">
        <div class="dome-housing">
          <div class="dome-shine"></div>
          <div class="capsule-pile" id="capsulePile"></div>
        </div>
        <div class="machine-body">
          <div class="slot-strip" id="slotStrip"></div>
          <div class="knob-row">
            <div class="machine-knob" id="machineKnob">
              <svg class="knob-icon" viewBox="0 0 40 60" width="30" height="44">
                <rect x="14" y="4" width="12" height="36" rx="6" fill="#fdfdfd" stroke="#2b2b35" stroke-width="2.5"/>
                <circle cx="20" cy="46" r="11" fill="#ef5068" stroke="#2b2b35" stroke-width="2.5"/>
              </svg>
            </div>
          </div>
          <div class="pull-label" id="tapHintGacha">กดปุ่มตรงกลางตู้ได้เลย</div>
        </div>
      </div>

      <div class="tray">
        <div class="capsule" id="capsule">
          <div class="top"></div><div class="bottom"></div>
          <div class="seam"></div>
          <div class="shine"></div>
          <div class="sparkle-burst" id="sparkleBurst"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="reveal" id="reveal">
  <div class="reveal-card">
    <div class="reveal-tag" id="revealTag">ได้รับข้อความแล้ว แคปส่งมาหน่อย อุอิ</div>
    <p class="reveal-msg" id="revealMsg"></p>
    <div class="reveal-actions" id="revealActions">
      <button class="btn btn-again" id="btnAgain">หมุนอีกครั้ง 🎰</button>
      <button class="btn btn-close" id="btnClose">เก็บไว้ก่อน</button>
    </div>
  </div>
</div>

<script>
  /* ===================== Sound effects (Web Audio API, no files needed) ===================== */
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function playTone(freq, duration, type, startGain, endFreq) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (endFreq) {
        osc.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + duration);
      }
      gain.gain.setValueAtTime(startGain || 0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    } catch (e) { /* audio not available, fail silently */ }
  }

  function sfxTap() {
    playTone(480 + Math.random() * 80, 0.07, 'sine', 0.1);
  }
  function sfxKnobPress() {
    playTone(220, 0.1, 'square', 0.08, 110);
  }
  function sfxDrop() {
    playTone(700, 0.32, 'sine', 0.07, 180);
  }
  function sfxOpen() {
    [660, 880, 1100].forEach((f, i) => {
      setTimeout(() => playTone(f, 0.16, 'triangle', 0.1), i * 80);
    });
  }
  function sfxConfetti() {
    [520, 660, 780, 990].forEach((f, i) => {
      setTimeout(() => playTone(f, 0.18, 'triangle', 0.07), i * 60);
    });
  }

  /* ===================== Heart Click logic ===================== */
  const heartZone = document.getElementById('heartZone');
  const fillClipRect = document.getElementById('fillClipRect');
  const ringFill = document.getElementById('ringFill');
  const tapHintHeart = document.getElementById('tapHintHeart');
  const headingHeart = document.getElementById('headingHeart');
  const eyebrowHeart = document.getElementById('eyebrowHeart');
  const floaters = document.getElementById('floaters');
  const continueBtn = document.getElementById('continueBtn');

  const TARGET = 20;
  const RING_CIRC = 614;
  let taps = 0;
  let heartDone = false;

  const milestoneWords = {
    4: 'คิดถึง...', 8: 'อบอุ่นใจ...', 12: 'มีความหมาย...', 16: 'รักมากขึ้นทุกวัน...'
  };
  const symbols = ['💗','🐱','💕','😻'];

  function spawnFloater() {
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    f.style.left = (40 + Math.random() * 20) + '%';
    f.style.top = (45 + Math.random() * 10) + '%';
    floaters.appendChild(f);
    setTimeout(() => f.remove(), 1200);
  }
  function spawnWord(text) {
    const w = document.createElement('div');
    w.className = 'word-pop';
    w.textContent = text;
    w.style.left = '50%';
    w.style.top = '-6px';
    floaters.appendChild(w);
    setTimeout(() => w.remove(), 1700);
  }

  function updateFill() {
    const pct = Math.min(taps / TARGET, 1);
    const heightPct = pct * 100;
    fillClipRect.setAttribute('y', 100 - heightPct);
    fillClipRect.setAttribute('height', heightPct);
    ringFill.style.strokeDashoffset = RING_CIRC * (1 - pct);
    tapHintHeart.textContent = `${Math.min(taps, TARGET)} / ${TARGET}`;
  }

  const quips = [
    'งับ!', 'จิ้มอะไร!', 'เบาๆดิ~', 'อุ๊ย!', 'ซนนะเรา', 'ตุ้บ!', 'แปะ!', 'หยอกกันป่ะ', 'จั๊กจี้!', 'อีกแล้ว?!'
  ];

  function spawnQuip() {
    const q = document.createElement('div');
    q.className = 'quip-pop';
    q.textContent = quips[Math.floor(Math.random() * quips.length)];
    q.style.left = (35 + Math.random() * 30) + '%';
    q.style.top = (20 + Math.random() * 15) + '%';
    floaters.appendChild(q);
    setTimeout(() => q.remove(), 900);
  }

  function spawnPaw() {
    const p = document.createElement('div');
    p.className = 'paw-swipe';
    p.textContent = Math.random() > 0.5 ? '🐾' : '🐱';
    floaters.appendChild(p);
    setTimeout(() => p.remove(), 750);
  }

  function pulseHeart() {
    heartZone.classList.add('tapped', 'wobble');
    setTimeout(() => heartZone.classList.remove('tapped', 'wobble'), 400);
  }

  heartZone.addEventListener('click', () => {
    if (heartDone) return;
    taps++;
    pulseHeart();
    spawnFloater();
    updateFill();
    sfxTap();
    if (milestoneWords[taps]) spawnWord(milestoneWords[taps]);

    if (Math.random() < 0.45) spawnQuip();
    if (taps % 5 === 0) spawnPaw();

    if (taps >= TARGET) {
      heartDone = true;
      eyebrowHeart.style.opacity = '0';
      headingHeart.textContent = 'หัวใจเต็มแล้ว 💗';
      spawnConfetti();
      sfxConfetti();
      setTimeout(() => { continueBtn.classList.add('show'); }, 500);
    }
  });

  continueBtn.addEventListener('click', () => { sfxOpen(); goToGacha(); });

  /* ===================== Scene transition ===================== */
  const sceneHeart = document.getElementById('sceneHeart');
  const sceneGacha = document.getElementById('sceneGacha');

  function goToGacha() {
    sceneHeart.classList.add('exit-left');
    setTimeout(() => {
      sceneGacha.classList.remove('enter-wait');
      sceneGacha.classList.add('enter-active');
    }, 350);
  }

  /* ===================== Gacha Love logic ===================== */
  const messages = [
    "KATSU MIDORI 🍣",
    "Sushiro 🍣",
    "Yakiniku 🥩",
    "Momo Paradise 🍲",
    "อะไรก็ได้เจ๊ศรีเลือก 🙏",
    "อะไรก็ได้เจ๊ศรีเลือก 🙏"
  ];
  const capsuleColors = [
    ['#ff5fa8', '#ffd6e8'], ['#8b6bf2', '#e2d9ff'], ['#52e3d9', '#d6fff9'],
    ['#ffc35c', '#fff0d2'], ['#5f9bff', '#dce9ff'],
  ];

  const knob = document.getElementById('machineKnob');
  const fallingCapsule = document.getElementById('fallingCapsule');
  const slotStrip = document.getElementById('slotStrip');
  const capsule = document.getElementById('capsule');
  const reveal = document.getElementById('reveal');
  const revealMsg = document.getElementById('revealMsg');
  const revealTag = document.getElementById('revealTag');
  const revealActions = document.getElementById('revealActions');
  const counter = document.getElementById('counter');
  const tapHintGacha = document.getElementById('tapHintGacha');
  const headingGacha = document.getElementById('headingGacha');
  const sparkleBurst = document.getElementById('sparkleBurst');
  const capsulePile = document.getElementById('capsulePile');
  const btnAgain = document.getElementById('btnAgain');
  const btnClose = document.getElementById('btnClose');

  let busy = false;
  let spins = 0;
  let usedIndices = [];
  const MAX_SPINS = 1;

  function buildPile() {
    capsulePile.innerHTML = '';
    const floatNames = ['capsuleFloatA', 'capsuleFloatB', 'capsuleFloatC'];
    for (let i = 0; i < 14; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'capsule-scatter';
      wrap.style.left = (14 + Math.random() * 62) + '%';
      wrap.style.top = (36 + Math.random() * 48) + '%';

      const c = document.createElement('div');
      c.className = 'pile-capsule';
      const [top, bottom] = capsuleColors[Math.floor(Math.random() * capsuleColors.length)];
      c.innerHTML = `<div class="top" style="background:${top}"></div><div class="bottom" style="background:${bottom}"></div>`;
      const floatName = floatNames[Math.floor(Math.random() * floatNames.length)];
      c.style.animation = `${floatName} ${2.6 + Math.random() * 2.2}s ease-in-out infinite`;
      c.style.animationDelay = (Math.random() * 2) + 's';

      wrap.appendChild(c);
      capsulePile.appendChild(wrap);
    }
  }
  buildPile();

  function scatterPile() {
    const wraps = capsulePile.querySelectorAll('.capsule-scatter');
    wraps.forEach(w => {
      const sx = (Math.random() * 32 - 16).toFixed(1) + 'px';
      const sy = (Math.random() * 32 - 16).toFixed(1) + 'px';
      w.style.setProperty('--sx', sx);
      w.style.setProperty('--sy', sy);
      w.classList.remove('scattering');
      // restart animation
      void w.offsetWidth;
      w.classList.add('scattering');
    });
    setTimeout(() => {
      wraps.forEach(w => w.classList.remove('scattering'));
    }, 650);
  }

  function pickMessageIndex() {
    if (usedIndices.length >= messages.length) usedIndices = [];
    let idx;
    do { idx = Math.floor(Math.random() * messages.length); } while (usedIndices.includes(idx));
    usedIndices.push(idx);
    return idx;
  }
  function colorCapsule(el, colors) {
    const top = el.querySelector('.top'); const bottom = el.querySelector('.bottom');
    if (top) top.style.background = colors[0];
    if (bottom) bottom.style.background = colors[1];
  }
  function spawnSparks(container) {
    for (let i = 0; i < 10; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.textContent = ['✦','✧','·','✨'][Math.floor(Math.random()*4)];
      s.style.left = '50%'; s.style.top = '50%';
      s.style.color = ['#ff5fa8','#8b6bf2','#52e3d9','#ffc35c'][Math.floor(Math.random()*4)];
      const angle = Math.random() * Math.PI * 2;
      const dist = 26 + Math.random() * 24;
      s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      container.appendChild(s);
      setTimeout(() => s.remove(), 750);
    }
  }
  function spawnConfetti() {
    const burst = document.createElement('div');
    burst.className = 'confetti-burst';
    document.body.appendChild(burst);
    const colors = ['#ff8fc4', '#ffd479', '#a78bfa', '#ffffff'];
    for (let i = 0; i < 40; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      const angle = Math.random() * Math.PI * 2;
      const dist = 130 + Math.random() * 240;
      c.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
      c.style.setProperty('--by', Math.sin(angle) * dist + 'px');
      c.style.setProperty('--br', (Math.random() * 540 - 270) + 'deg');
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.15) + 's';
      burst.appendChild(c);
    }
    setTimeout(() => burst.remove(), 1900);
  }

  function dropCapsuleFromSlot(colors) {
    const slotRect = slotStrip.getBoundingClientRect();
    const trayRect = capsule.getBoundingClientRect();

    const startX = slotRect.left + slotRect.width / 2;
    const startY = slotRect.top + slotRect.height / 2;
    const endX = trayRect.left + trayRect.width / 2;
    const endY = trayRect.top + trayRect.height / 2;

    colorCapsule(fallingCapsule, colors);

    // snap to start position with no transition, then trigger the animated fall
    fallingCapsule.style.transition = 'none';
    fallingCapsule.style.left = startX + 'px';
    fallingCapsule.style.top = startY + 'px';
    fallingCapsule.style.opacity = '1';
    fallingCapsule.style.transform = 'translate(-50%, -50%) scale(0.7)';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fallingCapsule.style.transition = 'top 0.55s cubic-bezier(0.5,0,0.85,0.4), left 0.55s cubic-bezier(0.5,0,0.85,0.4), transform 0.55s cubic-bezier(0.5,0,0.85,0.4)';
        fallingCapsule.style.left = endX + 'px';
        fallingCapsule.style.top = endY + 'px';
        fallingCapsule.style.transform = 'translate(-50%, -50%) scale(1.05)';
      });
    });
  }

  function doSpin() {
    if (busy || spins >= MAX_SPINS) return;
    busy = true;
    spins++;
    counter.textContent = `หมุนแล้ว ${spins} ครั้ง`;
    tapHintGacha.style.opacity = '0';
    headingGacha.textContent = 'กำลังสุ่มให้...';
    sfxKnobPress();
    knob.classList.add('spin');
    setTimeout(() => knob.classList.remove('spin'), 600);
    capsulePile.classList.add('shaking');
    setTimeout(() => capsulePile.classList.remove('shaking'), 650);
    scatterPile();

    const colors = capsuleColors[Math.floor(Math.random() * capsuleColors.length)];
    capsule.classList.remove('show', 'bounce', 'idle-pulse');

    setTimeout(() => { dropCapsuleFromSlot(colors); sfxDrop(); }, 180);
    setTimeout(() => {
      fallingCapsule.style.opacity = '0';
      colorCapsule(capsule, colors);
      capsule.classList.add('show', 'idle-pulse');
      headingGacha.textContent = 'แตะแคปซูลเพื่อเปิดอ่าน';
      if (spins >= MAX_SPINS) {
        knob.style.opacity = '0.45';
        knob.style.pointerEvents = 'none';
      }
    }, 760);
  }

  capsule.addEventListener('click', () => {
    if (!capsule.classList.contains('show')) return;
    capsule.classList.remove('idle-pulse');
    capsule.classList.add('bounce');
    spawnSparks(sparkleBurst);
    sfxOpen();
    const idx = pickMessageIndex();
    revealTag.textContent = 'ได้รับข้อความแล้ว แคปส่งมาหน่อย อุอิ';
    revealActions.style.display = 'flex';
    if (spins >= MAX_SPINS) {
      btnAgain.style.display = 'none';
    }
    setTimeout(() => {
      revealMsg.textContent = messages[idx];
      reveal.classList.add('show');
    }, 280);
  });

  knob.addEventListener('click', doSpin);

  btnAgain.addEventListener('click', () => {
    if (spins >= MAX_SPINS) return;
    reveal.classList.remove('show');
    capsule.classList.remove('show', 'bounce');
    busy = false;
    headingGacha.textContent = 'กดปุ่ม เพื่อดูว่า จะได้กินอะไร วันอาทิตย์';
    setTimeout(doSpin, 350);
  });
  btnClose.addEventListener('click', () => {
    reveal.classList.remove('show');
    capsule.classList.remove('show', 'bounce');
    busy = false;
    if (spins >= MAX_SPINS) {
      headingGacha.textContent = 'จะได้กินอะไร วันอาทิตย์ 😼';
    } else {
      headingGacha.textContent = 'กดปุ่มอีกครั้งได้เรื่อยๆ';
      tapHintGacha.style.opacity = '0.85';
    }
  });
  reveal.addEventListener('click', (e) => {
    if (e.target === reveal) {
      reveal.classList.remove('show');
      capsule.classList.remove('show', 'bounce');
      busy = false;
    }
  });

  // confetti function used by heart click completion too
  function spawnConfettiShared() { spawnConfetti(); }
</script>

</body>
</html>
